<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéApp - Favoritos</title>
    <style>
        :root {
            --primary: #ef5350;
            --primary-dark: #d32f2f;
            --background: #f5f7fa;
            --card-bg: #ffffff;
            --text: #333333;
            --fav-color: #ffca28;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text);
            padding-bottom: 40px;
        }

        header {
            background-color: var(--primary);
            color: white;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .search-container {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
        }

        input[type="text"] {
            padding: 12px 20px;
            width: 100%;
            max-width: 400px;
            border: 2px solid #ddd;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover {
            background-color: var(--primary-dark);
        }

        h2 {
            margin-bottom: 20px;
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            position: relative;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }

        .card img {
            width: 120px;
            height: 120px;
            object-fit: contain;
        }

        .card .name {
            font-size: 18px;
            font-weight: bold;
            text-transform: capitalize;
            margin: 10px 0;
        }

        .card .types {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-bottom: 15px;
        }

        .type-badge {
            font-size: 12px;
            padding: 3px 10px;
            border-radius: 12px;
            color: white;
            text-transform: uppercase;
            font-weight: bold;
            background-color: #9e9e9e; /* Default */
        }

        /* Colores de tipos básicos */
        .type-grass { background-color: #4caf50; }
        .type-fire { background-color: #ff9800; }
        .type-water { background-color: #2196f3; }
        .type-bug { background-color: #8bc34a; }
        .type-normal { background-color: #9e9e9e; }
        .type-poison { background-color: #9c27b0; }
        .type-electric { background-color: #ffeb3b; color: #333; }

        .btn-fav {
            background: none;
            border: 2px solid #ddd;
            color: #777;
            padding: 6px 12px;
            font-size: 14px;
            border-radius: 15px;
            width: 100%;
            transition: all 0.2s;
        }

        .btn-fav.active {
            background-color: var(--fav-color);
            border-color: var(--fav-color);
            color: #333;
        }

        .message {
            text-align: center;
            color: #777;
            grid-column: 1 / -1;
            padding: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1>PokéApp con Favoritos</h1>
    </header>

    <div class="container">
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Buscar Pokémon por nombre o ID...">
            <button id="search-btn">Buscar</button>
        </div>

        <h2>Mis Favoritos ⭐</h2>
        <div class="grid" id="favorites-grid">
            <p class="message">No tenés Pokémon favoritos guardados todavía.</p>
        </div>

        <h2>Explorar / Resultado</h2>
        <div class="grid" id="main-grid">
            </div>
    </div>

    <script>
        // Elementos del DOM
        const searchInput = document.getElementById('search-input');
        const searchBtn = document.getElementById('search-btn');
        const mainGrid = document.getElementById('main-grid');
        const favoritesGrid = document.getElementById('favorites-grid');

        // Estado de la app: Cargar favoritos desde localStorage
        let favorites = JSON.parse(localStorage.getItem('poke_favorites')) || [];

        // Inicialización
        document.addEventListener('DOMContentLoaded', () => {
            loadInitialPokemon();
            renderFavorites();
        });

        // Buscar al hacer click o presionar Enter
        searchBtn.addEventListener('click', searchPokemon);
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchPokemon();
        });

        // Cargar 12 Pokémon iniciales para que la pantalla no esté vacía
        async function loadInitialPokemon() {
            mainGrid.innerHTML = '<p class="message">Cargando Pokémon...</p>';
            try {
                const pokemonList = [];
                // Traemos los primeros 12 por ID
                for (let i = 1; i <= 12; i++) {
                    const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${i}`);
                    if (res.ok) {
                        const data = await res.json();
                        pokemonList.push(data);
                    }
                }
                mainGrid.innerHTML = '';
                pokemonList.forEach(poke => createPokeCard(poke, mainGrid));
            } catch (error) {
                mainGrid.innerHTML = '<p class="message">Error al cargar la lista inicial.</p>';
            }
        }

        // Buscar un Pokémon específico por la API
        async function searchPokemon() {
            const query = searchInput.value.trim().toLowerCase();
            if (!query) {
                loadInitialPokemon();
                return;
            }

            mainGrid.innerHTML = '<p class="message">Buscando...</p>';

            try {
                const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${query}`);
                if (!res.ok) throw new Error('Pokémon no encontrado');
                
                const pokeData = await res.json();
                mainGrid.innerHTML = '';
                createPokeCard(pokeData, mainGrid);
            } catch (error) {
                mainGrid.innerHTML = `<p class="message">❌ No se encontró ningún Pokémon con ese nombre o ID.</p>`;
            }
        }

        // Crear dinámicamente la tarjeta del Pokémon
        function createPokeCard(poke, targetGrid) {
            const isFav = favorites.some(fav => fav.id === poke.id);
            
            const card = document.createElement('div');
            card.classList.add('card');
            
            // Mapear tipos a badges HTML
            const typesHTML = poke.types.map(t => 
                `<span class="type-badge type-${t.type.name}">${t.type.name}</span>`
            ).join('');

            card.innerHTML = `
                <img src="${poke.sprites.other['official-artwork'].front_default || poke.sprites.front_default}" alt="${poke.name}">
                <div class="name">${poke.name} <span style="color:#aaa; font-size:14px;">#${poke.id}</span></div>
                <div class="types">${typesHTML}</div>
                <button class="btn-fav ${isFav ? 'active' : ''}" onclick="toggleFavorite(${poke.id}, '${poke.name}', '${poke.sprites.other['official-artwork'].front_default || poke.sprites.front_default}', '${poke.types[0].type.name}')">
                    ${isFav ? '★ Quitar de Favoritos' : '☆ Agregar a Favoritos'}
                </button>
            `;
            
            targetGrid.appendChild(card);
        }

        // Agregar o quitar de favoritos
        window.toggleFavorite = function(id, name, image, primaryType) {
            const index = favorites.findIndex(fav => fav.id === id);
            
            if (index > -1) {
                // Si ya existe, lo sacamos
                favorites.splice(index, 1);
            } else {
                // Si no existe, lo sumamos
                favorites.push({ id, name, image, primaryType });
            }

            // Guardar en LocalStorage
            localStorage.setItem('poke_favorites', JSON.stringify(favorites));
            
            // Refrescar ambas vistas para mantener la sincronía de los botones
            renderFavorites();
            refreshMainGridButtons();
        }

        // Renderizar la sección de favoritos
        function renderFavorites() {
            favoritesGrid.innerHTML = '';
            
            if (favorites.length === 0) {
                favoritesGrid.innerHTML = '<p class="message">No tenés Pokémon favoritos guardados todavía.</p>';
                return;
            }

            favorites.forEach(fav => {
                // Simulamos la estructura mínima que necesita createPokeCard para no volver a pegarle a la API
                const mockPoke = {
                    id: fav.id,
                    name: fav.name,
                    sprites: { other: { 'official-artwork': { front_default: fav.image } } },
                    types: [{ type: { name: fav.primaryType } }]
                };
                createPokeCard(mockPoke, favoritesGrid);
            });
        }

        // Sincronizar el estado de los botones en la grilla principal
        function refreshMainGridButtons() {
            const cards = mainGrid.querySelectorAll('.card');
            cards.forEach(card => {
                const btn = card.querySelector('.btn-fav');
                // Extraemos el id del onclick (forma rápida para este ejemplo)
                const onclickAttr = btn.getAttribute('onclick');
                const idMatch = onclickAttr.match(/toggleFavorite\((\d+)/);
                if (idMatch) {
                    const id = parseInt(idMatch[1]);
                    const isFav = favorites.some(fav => fav.id === id);
                    if (isFav) {
                        btn.classList.add('active');
                        btn.innerText = '★ Quitar de Favoritos';
                    } else {
                        btn.classList.remove('active');
                        btn.innerText = '☆ Agregar a Favoritos';
                    }
                }
            });
        }
    </script>
</body>
</html>
